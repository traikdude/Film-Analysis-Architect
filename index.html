<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Film Analysis Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #0f0c29;
        background-image: linear-gradient(315deg, #0f0c29 0%, #302b63 74%, #24243e 100%);
        color: #e2e8f0;
        min-height: 100vh;
      }
      /* Custom scrollbar for joyful theme */
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-track {
        background: rgba(0,0,0,0.2); 
      }
      ::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #ec4899, #8b5cf6); 
        border-radius: 5px;
        border: 2px solid rgba(0,0,0,0.2);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #db2777, #7c3aed); 
      }
      
      .glass-panel {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      :root {
          --mx: 50%;
          --my: 50%;
          --s: 1;
          --o: 0;
          --tx: 0px;
          --ty: 0px;
          --rx: 0deg;
          --ry: 0deg;
          --pos: 50% 50%;
          --posx: 50%;
          --posy: 50%;
          --hyp: 0;
      }

      .card {
          --radius: 1.5rem;
          z-index: calc(var(--s) * 100);
          transform: translate3d(0, 0, 0.1px);
          will-change: transform, visibility;
          transform-style: preserve-3d;
      }

      .card.interacting {
          z-index: calc(var(--s) * 120);
      }

      .card__translater,
      .card__rotator {
          display: grid;
          perspective: 1000px;
          transform-origin: center;
          will-change: transform;
          width: 100%;
          height: 100%;
      }

      .card__translater {
          width: auto;
          position: relative;
          transform: translate3d(var(--tx), var(--ty), 0) scale(var(--s));
      }

      .card__rotator {
          --glow: rgba(139, 92, 246, 0.3);
          transform: rotateY(var(--rx)) rotateX(var(--ry));
          transform-style: preserve-3d;
          box-shadow: 0px 15px 35px -5px rgba(0,0,0,0.5);
          border-radius: var(--radius);
          outline: none;
          transition: box-shadow 0.4s ease, outline 0.2s ease, transform 0.1s ease-out;
      }

      .card__rotator * {
          grid-area: 1/1;
          border-radius: var(--radius);
          transform-style: preserve-3d;
      }

      .card__shine, .card__glare {
          position: absolute;
          inset: 0;
          border-radius: var(--radius);
          pointer-events: none;
          z-index: 10;
          opacity: var(--o);
          will-change: opacity, background-position, background-image, filter;
          transition: opacity 0.2s ease;
      }

      .card__glare {
          z-index: 11;
          mix-blend-mode: overlay;
          background-image: radial-gradient(
              farthest-corner circle at var(--mx) var(--my),
              rgba(255, 255, 255, 0.45) 10%,
              rgba(255, 255, 255, 0) 60%
          );
      }

      .card__shine {
          --space: 5%;
          --angle: 133deg;
          --imgsize: 500px;
          --red: #f80e7b;
          --yel: #eedf10;
          --gre: #21e985;
          --blu: #0dbde9;
          --vio: #c929f1;
      }

      /* Default Holo */
      .card[data-rarity="rare holo"] .card__shine {
          --space: 4%;
          --h: 21;
          --s: 70%;
          --l: 50%;
          --bars: 24px;
          --bar-color: rgba(255, 255, 255, 0.45);
          --bar-bg: rgb(10, 10, 10);
          background-image: repeating-linear-gradient(
              90deg,
              hsl(calc(var(--h) * 0), var(--s), var(--l)) calc(var(--space) * 0),
              hsl(calc(var(--h) * 0), var(--s), var(--l)) calc(var(--space) * 1),
              black calc(var(--space) * 1.001),
              black calc(var(--space) * 1.999),
              hsl(calc(var(--h) * 4), var(--s), var(--l)) calc(var(--space) * 8),
              hsl(calc(var(--h) * 4), var(--s), var(--l)) calc(var(--space) * 9)
          ),
          repeating-linear-gradient(
              90deg,
              var(--vio),
              var(--blu),
              var(--gre),
              var(--yel),
              var(--red),
              var(--vio)
          ),
          radial-gradient(
              farthest-corner circle at var(--mx) var(--my),
              rgba(230, 230, 230, 0.85) 0%,
              rgba(200, 200, 200, 0.1) 40%,
              rgb(0, 0, 0) 90%
          );
          background-blend-mode: soft-light, overlay;
          background-position: center, calc(((50% - var(--posx)) * 25) + 50%) center, var(--pos);
          background-size: 100% 100%, 200% 200%, 120% 120%;
          filter: brightness(calc((var(--hyp) + 0.7) * 0.7)) contrast(2.5) saturate(0.8);
          mix-blend-mode: color-dodge;
      }

      /* Rainbow Holo */
      .card[data-rarity="rare rainbow"] .card__shine {
          --space: 7%;
          --angle: -20deg;
          --angle2: 130deg;
          --imgsize: 540px 700px;
          background-image: url("https://res.cloudinary.com/simey/image/upload/Dev/PokemonCards/rainbow2.jpg"),
              repeating-linear-gradient(
                  var(--angle),
                  rgb(253, 71, 65) calc(var(--space) * 1),
                  rgb(255, 243, 151) calc(var(--space) * 2),
                  rgba(168, 255, 95, 1) calc(var(--space) * 3),
                  rgba(131, 255, 247, 1) calc(var(--space) * 4),
                  rgb(75, 198, 255) calc(var(--space) * 5),
                  rgb(255, 73, 246) calc(var(--space) * 6),
                  rgb(255, 56, 49) calc(var(--space) * 7)
              ),
              repeating-linear-gradient(
                  var(--angle2),
                  rgba(89, 46, 80, 0.5) 0%,
                  hsl(118, 43%, 76%) 2.5%,
                  rgb(223, 96, 202) 5%,
                  hsl(180, 57%, 56%) 7.5%,
                  rgba(14, 21, 46, 0.5) 10%
              );
          background-size: 50% 50%, 500% 500%, 1000% 1000%;
          background-position: center, 0% calc(var(--posy) * 1.5), var(--posx) var(--posy);
          background-blend-mode: color-burn, soft-light;
          filter: brightness(calc((var(--hyp) * 0.25) + 0.75)) contrast(2.5) saturate(1.1);
          mix-blend-mode: color-dodge;
      }

      /* Secret Gold */
      .card[data-rarity="rare secret"] .card__shine {
          --angle: 110deg;
          --imgsize: 250px;
          background-image: url("https://res.cloudinary.com/simey/image/upload/Dev/PokemonCards/rainbow2.jpg"),
              repeating-linear-gradient(
                  var(--angle),
                  rgba(89, 46, 80, 0.5) 0%,
                  hsl(39, 37%, 60%) 2.5%,
                  rgb(216, 183, 92) 5%,
                  hsl(39, 37%, 60%) 7.5%,
                  rgba(14, 21, 46, 0.5) 10%
              ),
              url("https://res.cloudinary.com/simey/image/upload/Dev/PokemonCards/metal.webp");
          background-size: 50% 50%, 600% 600%, var(--imgsize);
          background-position: center, var(--posx) var(--posy), center;
          background-blend-mode: color-burn, darken;
          filter: brightness(calc((var(--hyp) * 0.4) + 0.75)) contrast(3) saturate(0.85);
          mix-blend-mode: color-dodge;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
